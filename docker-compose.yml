services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    # Port not exposed publicly — nginx proxies /api/ internally via Docker network
    expose:
      - "5000"
    volumes:
      - db-data:/app/data

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - "80:3000"
    depends_on:
      - api

volumes:
  db-data:
