server {
  listen 3000;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass https://family-tree-api.fly.dev/api/;
    proxy_ssl_server_name on;
  }

  location / {
    try_files $uri $uri/ /index.html;
    # Prevent browsers from caching index.html so new deployments are picked up immediately.
    # Hashed assets (JS/CSS) are safe to cache indefinitely via their filenames.
    add_header Cache-Control "no-cache";
  }
}
