name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install all workspace deps from root lock file
      - name: Install dependencies
        run: npm ci

      # Backend
      - name: Build api
        run: npm run build --workspace=api

      - name: Test api
        run: npm test --workspace=api

      # Frontend
      - name: Build ui
        run: npm run build --workspace=ui

      - name: Test ui (unit)
        run: npm test --workspace=ui
        continue-on-error: true  # No unit test files yet; remove once added

      # E2E
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: ui

      - name: Start api server
        run: npm run dev --workspace=api &

      - name: Start ui server
        run: npm run dev --workspace=ui &

      - name: Wait for servers
        run: npx wait-on http://localhost:5000/health http://localhost:3000 --timeout 30000

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: ui
