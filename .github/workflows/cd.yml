name: CD

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install all workspace deps from root lock file
      - name: Install dependencies
        run: npm ci

      # Backend
      - name: Build api
        run: npm run build --workspace=api

      - name: Test api
        run: npm test --workspace=api

      # Frontend
      - name: Build ui
        run: npm run build --workspace=ui

      - name: Test ui (unit)
        run: npm test --workspace=ui
        continue-on-error: true  # No unit test files yet; remove once added

      # E2E
      - name: Install Playwright browsers
        run: node_modules/.bin/playwright install --with-deps chromium

      - name: Start api server
        run: npm run dev --workspace=api &

      - name: Start ui server
        run: npm run dev --workspace=ui &

      - name: Wait for servers
        run: npx wait-on http://localhost:5000/health http://localhost:3000 --timeout 30000

      - name: Run E2E tests
        run: node_modules/.bin/playwright test --config ui/playwright.config.ts

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > ec2-key.pem
          chmod 600 ec2-key.pem
          ssh -i ec2-key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "cd ~/family-tree && git pull origin main && docker compose up -d --build && docker image prune -f"
